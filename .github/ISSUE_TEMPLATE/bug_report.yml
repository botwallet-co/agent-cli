name: Bug Report
description: Report a bug with the Botwallet CLI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands to reproduce the issue.
      placeholder: |
        1. Run `botwallet ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: CLI output
      description: Paste the full command output (JSON or --human).
      render: shell

  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `botwallet version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (arm64)
        - Windows (x86_64)
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - npm (`npm install -g @botwallet/agent-cli`)
        - Homebrew (`brew install`)
        - Scoop
        - Go install (`go install`)
        - Direct binary download
    validations:
      required: true
